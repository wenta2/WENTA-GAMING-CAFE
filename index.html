<!DOCTYPE html>
<html>
<head>

<meta name="google-site-verification" content="bpd0qok5y2cOrYAH34A5SsV-VhnFB1tak2_PpOIcfrg" />

<title>WENT.A Gaming Cafe</title>

<link rel="manifest" href="manifest.json">

<style>

:root{
--bg:#0b0f1a;
--card:#141a2f;
--neon:#00ffe1;
--text:#fff;
}

@media (prefers-color-scheme: light){
:root{
--bg:#f5f5f5;
--card:#ffffff;
--text:#000;
--neon:#0066ff;
}
}

body{
margin:0;
font-family:Segoe UI;
background:var(--bg);
color:var(--text);
}

/* HEADER */

header{
padding:20px;
text-align:center;
border-bottom:1px solid #333;
}

header h1{
margin:0;
color:var(--neon);
}

/* NAV */

nav{
display:flex;
justify-content:space-around;
background:var(--card);
padding:12px;
position:sticky;
top:0;
}

nav a{
text-decoration:none;
color:var(--text);
}

/* SECTION */

.section{
padding:20px;
}

/* SEATS */

.seats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
margin-top:20px;
}

.seat{
padding:25px;
background:var(--card);
text-align:center;
border-radius:10px;
cursor:pointer;
border:2px solid #00ff88;
}

.booked{
border:2px solid red;
opacity:.6;
}

/* FORM */

form{
max-width:400px;
margin:auto;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:6px;
}

/* BUTTON */

button{
background:var(--neon);
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
}

/* QR POPUP */

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
justify-content:center;
align-items:center;
}

.popupbox{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
}

/* ADMIN */

#adminBtn{
position:fixed;
bottom:10px;
right:10px;
width:25px;
height:25px;
cursor:pointer;
}

#adminPanel{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:var(--bg);
padding:30px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid #444;
padding:10px;
}

.deleteBtn{
background:red;
color:white;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h1>WENT.A Gaming Cafe</h1>
<p>Premium Console Gaming Experience</p>

</header>

<nav>

<a href="#seatmap">Seats</a>
<a href="#booking">Book</a>

</nav>

<section class="section" id="seatmap">

<h2>Select Your Seat</h2>

<div class="seats" id="seatGrid"></div>

</section>

<section class="section" id="booking">

<h2>Booking</h2>

<form onsubmit="bookSeat(event)">

<input id="name" placeholder="Name" required>

<input id="phone" placeholder="Mobile Number" required>

<select id="console" required>
<option value="">Console</option>
<option>PS5</option>
<option>PS4</option>
</select>

<select id="game" required>
<option value="">Game</option>
<option>EA Sports FC</option>
<option>Call of Duty</option>
<option>Grand Theft Auto V</option>
<option>Assetto Corsa</option>
</select>

<select id="players" required>
<option value="">Players</option>
<option>1 Player</option>
<option>2 Player</option>
<option>4 Player</option>
</select>

<input type="time" id="time" required>

<button type="submit">Confirm Booking</button>

</form>

<br>

<button onclick="showQR()">Pay with UPI</button>

</section>

<!-- PAYMENT QR -->

<div class="popup" id="qr">

<div class="popupbox">

<h3>Scan to Pay</h3>

<img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=upi://pay?pa=fatheenhameed58@okaxis&pn=WENTA&am=150">

<br><br>

<button onclick="closeQR()">Close</button>

</div>

</div>

<!-- ADMIN BUTTON -->

<div id="adminBtn" onclick="openAdmin()"></div>

<!-- ADMIN PANEL -->

<div id="adminPanel">

<h2>Admin Login</h2>

<input id="adminPass" placeholder="Password">

<button onclick="loginAdmin()">Login</button>

<div id="dashboard" style="display:none">

<h3>Bookings Dashboard</h3>

<table>

<thead>

<tr>
<th>Name</th>
<th>Phone</th>
<th>Console</th>
<th>Game</th>
<th>Players</th>
<th>Time</th>
<th>Seat</th>
<th>Delete</th>
</tr>

</thead>

<tbody id="bookingList"></tbody>

</table>

</div>

</div>

<script>

/* LIVE SEATS */

let seatGrid=document.getElementById("seatGrid")

let seatData=JSON.parse(localStorage.getItem("seats"))||{}

for(let i=1;i<=12;i++){

let seat=document.createElement("div")

seat.className="seat"

seat.innerText="Seat "+i

if(seatData[i]) seat.classList.add("booked")

seat.onclick=function(){

if(!seat.classList.contains("booked")){

localStorage.setItem("selectedSeat",i)

alert("Seat "+i+" selected")

location="#booking"

}

}

seatGrid.appendChild(seat)

}

/* BOOKING */

function bookSeat(e){

e.preventDefault()

let seat=localStorage.getItem("selectedSeat")

if(!seat){

alert("Please select a seat first")

return

}

let booking={

name:name.value,
phone:phone.value,
console:console.value,
game:game.value,
players:players.value,
time:time.value,
seat:seat

}

let bookings=JSON.parse(localStorage.getItem("bookings"))||[]

bookings.push(booking)

localStorage.setItem("bookings",JSON.stringify(bookings))

let seats=JSON.parse(localStorage.getItem("seats"))||{}

seats[seat]=true

localStorage.setItem("seats",JSON.stringify(seats))

alert("Booking Confirmed!")

location.reload()

}

/* PAYMENT */

function showQR(){

document.getElementById("qr").style.display="flex"

}

function closeQR(){

document.getElementById("qr").style.display="none"

}

/* ADMIN */

function openAdmin(){

document.getElementById("adminPanel").style.display="block"

}

function loginAdmin(){

if(adminPass.value==="wenta123"){

document.getElementById("dashboard").style.display="block"

loadBookings()

}else{

alert("Wrong Password")

}

}

function loadBookings(){

let bookings=JSON.parse(localStorage.getItem("bookings"))||[]

let table=document.getElementById("bookingList")

table.innerHTML=""

bookings.forEach((b,i)=>{

table.innerHTML+=`

<tr>

<td>${b.name}</td>
<td>${b.phone}</td>
<td>${b.console}</td>
<td>${b.game}</td>
<td>${b.players}</td>
<td>${b.time}</td>
<td>${b.seat}</td>

<td>
<button class="deleteBtn" onclick="deleteBooking(${i})">🗑</button>
</td>

</tr>

`

})

}

/* DELETE */

function deleteBooking(i){

let bookings=JSON.parse(localStorage.getItem("bookings"))||[]

let seats=JSON.parse(localStorage.getItem("seats"))||{}

let seat=bookings[i].seat

delete seats[seat]

bookings.splice(i,1)

localStorage.setItem("bookings",JSON.stringify(bookings))
localStorage.setItem("seats",JSON.stringify(seats))

loadBookings()

}

</script>

</body>
</html>
